<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerbang Masuk Sistem | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans">

<div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-80 h-80 bg-purple-500/10 rounded-full blur-[120px] pointer-events-none"></div>

<div class="w-full max-w-md bg-slate-900/50 backdrop-blur-2xl border border-slate-800/80 p-8 md:p-10 rounded-2xl shadow-2xl relative z-10">

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-4 shadow-lg shadow-indigo-500/20">
            <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Selamat Datang</h2>
        <p class="text-slate-400 text-sm mt-1.5">Silakan autentikasi akun Anda untuk masuk</p>
    </div>

    <div th:if="${param.error}" class="flex items-center space-x-2 bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm animate-fade-in">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
        <span>Kredensial salah, silakan periksa kembali.</span>
    </div>

    <div th:if="${param.logout}" class="flex items-center space-x-2 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-4 py-3 rounded-lg mb-6 text-sm">
        <i data-lucide="check-circle" class="w-4 h-4 shrink-0"></i>
        <span>Sesi aman ditutup. Anda berhasil keluar.</span>
    </div>

    <form th:action="@{/login}" method="POST" class="space-y-5">
        <div class="space-y-1.5">
            <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider block">Username</label>
            <div class="relative">
                <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="text" name="username" placeholder="Masukkan nama pengguna" required
                       class="w-full bg-slate-950/60 border border-slate-800 rounded-lg pl-10 pr-3 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
            </div>
        </div>

        <div class="space-y-1.5">
            <div class="flex justify-between items-center">
                <label class="text-xs font-semibold text-slate-300 uppercase tracking-wider block">Password</label>
            </div>
            <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="password" name="password" placeholder="Masukkan kata sandi" required
                       class="w-full bg-slate-950/60 border border-slate-800 rounded-lg pl-10 pr-3 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
            </div>
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-4 rounded-lg shadow-lg shadow-indigo-600/10 hover:shadow-indigo-600/20 transition duration-200 transform active:scale-[0.98] flex items-center justify-center space-x-2 cursor-pointer mt-2">
            <span>Autentikasi Keamanan</span>
            <i data-lucide="key-round" class="w-4 h-4"></i>
        </button>
    </form>

    <div class="text-center mt-6 pt-4 border-t border-slate-800/60">
        <p class="text-sm text-slate-400">
            Belum memiliki akses? <a th:href="@{/register}" class="text-indigo-400 hover:text-indigo-300 font-medium transition underline underline-offset-4">Daftar Akun Baru</a>
        </p>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
